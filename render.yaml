services:
  # HTTP Enrichment Worker
  - type: worker
    name: enrichment-http-worker
    runtime: python
    rootDir: apps/worker-http
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SQS_HTTP_QUEUE_URL
        sync: false
      - key: SQS_BROWSER_QUEUE_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
